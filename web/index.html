// ── Toggle Component ──
function Toggle({on,onChange,label}){
  return(
    <div style={S.tgRow}>
      <div style={{...S.tg,...(on?S.tgOn:{})}} onClick={onChange}>
        <div style={{...S.tgK,...(on?S.tgKOn:{})}}/>
      </div>
      <span style={{fontSize:13,color:"var(--txt2)"}}>{label}</span>
    </div>
  );
}

// ── Chip Component ──
function Chip({children,style,onClick}){
  return <div style={{...S.cp,...style}} onClick={onClick}>{children}</div>;
}

// ── Modal Component ──
function Modal({show,title,body,confirmLabel,confirmStyle,onConfirm,onCancel}){
  if(!show)return null;
  return(
    <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)onCancel()}}>
      <div style={S.modalBox}>
        <h3 style={{font:"600 16px var(--sans)",marginBottom:10}}>{title}</h3>
        <div style={{fontSize:13,color:"var(--txt2)",lineHeight:1.6}} dangerouslySetInnerHTML={{__html:body}}/>
        <div style={S.modalBtns}>
          <button style={S.modalCancel} onClick={onCancel}>Cancel</button>
          <button style={{...S.modalCancel,...confirmStyle}} onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

// ── Toast ──
function Toast({msg,type}){
  if(!msg)return null;
  return <div style={{...S.toast,...(type==="error"?S.toastErr:S.toastOk)}}>{msg}</div>;
}

// ── Progress Modal ──
function StepIcon({state}){
  if(state==='done')return <span style={{color:"var(--grn)",fontSize:16,lineHeight:1,flexShrink:0}}>✓</span>;
  if(state==='error')return <span style={{color:"var(--red)",fontSize:16,lineHeight:1,flexShrink:0}}>✕</span>;
  if(state==='running')return <span className="spin" style={{width:16,height:16,border:"2px solid var(--bdr2)",borderTopColor:"var(--blu)",borderRadius:"50%",flexShrink:0}}/>;
  return <span style={{display:"inline-block",width:16,height:16,border:"2px solid var(--bdr)",borderRadius:"50%",flexShrink:0}}/>;
}
function ProgressModal({modal,progressPct,countdown,onDismiss}){
  if(!modal)return null;
  const{action,phase,error,wgControl}=modal;
  const opening=action==='enable';
  const showWg=wgControl==='auto';
  let wgState,caddyState;
  if(phase==='api'){wgState='running';caddyState=showWg?'pending':'running';}
  else if(phase==='caddy'){wgState='done';caddyState='running';}
  else if(phase==='done'){wgState='done';caddyState='done';}
  else if(phase==='error'){wgState='error';caddyState=showWg?'pending':'error';}
  else{wgState='done';caddyState='error';}
  const isDone=phase==='done';
  const isError=phase==='error'||phase==='caddy_error';
  const title=isDone?(opening?"Latch opened ✓":"Latch locked ✓"):isError?(opening?"Failed to open":"Failed to lock"):(opening?"Opening latch...":"Locking down...");
  const barColor=isDone?'var(--grn)':isError?'var(--red)':'var(--blu)';
  return(
    <div style={S.modal}>
      <div style={{...S.modalBox,maxWidth:360}}>
        <h3 style={{font:"600 16px var(--sans)",marginBottom:20,color:isDone?"var(--grn)":isError?"var(--red)":"var(--txt)"}}>{title}</h3>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {showWg&&(
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <StepIcon state={wgState}/>
              <span style={{fontSize:13,color:wgState==='error'?"var(--red)":wgState==='done'?"var(--txt)":"var(--txt2)"}}>{opening?"Opening WireGuard tunnel":"Stopping WireGuard tunnel"}</span>
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <StepIcon state={caddyState}/>
            <span style={{fontSize:13,color:caddyState==='error'?"var(--red)":caddyState==='done'?"var(--txt)":"var(--txt2)"}}>Reloading Caddy filter</span>
          </div>
        </div>
        <div style={{height:4,background:'var(--bg4)',borderRadius:2,marginTop:20,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${progressPct}%`,background:barColor,borderRadius:2,transition:'width .08s linear'}}/>
        </div>
        {isError&&error&&<div style={{fontSize:12,color:"var(--red)",marginTop:14,padding:"8px 12px",background:"var(--red-d)",borderRadius:6,border:"1px solid var(--red)"}}>{error}</div>}
        {isDone&&<div style={{fontSize:11,color:"var(--txt3)",marginTop:12,textAlign:"center"}}>Closing in {countdown}s...</div>}
        {isError&&<div style={{...S.modalBtns,marginTop:16}}><button style={S.modalCancel} onClick={onDismiss}>Dismiss</button></div>}
      </div>
    </div>
  );
}

// ── Main App ──
function App(){
  const[dark,setDark]=useState(()=>{try{return localStorage.getItem('cl-theme')!=='light'}catch{return true}});
  const[installPrompt,setInstallPrompt]=useState(null);
  const[status,setStatus]=useState(null);
  const[stats,setStats]=useState(null);
  const[ipLists,setIpLists]=useState({});
  const[loading,setLoading]=useState(true);
  const[err,setErr]=useState(null);
  const[toast,setToast]=useState(null);
  const[acting,setActing]=useState(false);
  const[progressModal,setProgressModal]=useState(null);
  const[progressPct,setProgressPct]=useState(0);
  const[countdown,setCountdown]=useState(3);
  const[view,setView]=useState("main"); // main | lists | settings
  const[modal,setModal]=useState(null);
  const[hoveredChip,setHoveredChip]=useState(null);
  const[connected,setConnected]=useState(null); // null=initial, true=online, false=offline
  const lastCheckedRef=useRef(null);
  const toastTm=useRef(null);
  const dismissTm=useRef(null);
  const seeded=useRef(false);
  const prevStatusRef=useRef(null);
  const timerWarnFiredRef=useRef(false);

  // Quick picks (loaded from settings, used in main form)
  const[quickPicks,setQuickPicks]=useState(DEFAULT_QUICK_PICKS);

  // Settings view state
  const[settingsData,setSettingsData]=useState(null);
  const[settingsLoading,setSettingsLoading]=useState(false);
  const[sNtfyEnabled,setSNtfyEnabled]=useState(true);
  const[sNtfyUrl,setSNtfyUrl]=useState("");
  const[sNtfyTopic,setSNtfyTopic]=useState("");
  const[sNtfyAuthMode,setSNtfyAuthMode]=useState("none"); // none | userpass | token
  const[sNtfyUser,setSNtfyUser]=useState("");
  const[sNtfyPass,setSNtfyPass]=useState("");
  const[sNtfyToken,setSNtfyToken]=useState("");
  const[sNtfyPriority,setSNtfyPriority]=useState(3);
  const[sNtfyAlertPriority,setSNtfyAlertPriority]=useState(5);
  const[sDefaultDur,setSDefaultDur]=useState(120);
  const[sReminder,setSReminder]=useState(120);
  const[sTimezone,setSTimezone]=useState("UTC");
  const[sTimezoneQuery,setSTimezoneQuery]=useState("");
  const[sShowTzSearch,setSShowTzSearch]=useState(false);
  const[sQuickPicks,setSQuickPicks]=useState(DEFAULT_QUICK_PICKS);
  const[sQpSearch,setSQpSearch]=useState("");
  const[sShowQpSearch,setSShowQpSearch]=useState(false);
  const[sNotifPerm,setSNotifPerm]=useState(()=>(typeof Notification!=='undefined'?Notification.permission:'unsupported'));
  const[sTestingNtfy,setSTestingNtfy]=useState(false);

  // Form state
  const[geoRestriction,setGeoRestriction]=useState(false);
  const[selCountries,setSelCountries]=useState(new Set());
  const[extraCountries,setExtraCountries]=useState(new Set());
  const[showCountrySearch,setShowCountrySearch]=useState(false);
  const[countryQuery,setCountryQuery]=useState("");
  const[countryLimit,setCountryLimit]=useState(10);
  const[ipRestriction,setIpRestriction]=useState(false);
  const[myIpActive,setMyIpActive]=useState(false);
  const[myIpAddr,setMyIpAddr]=useState("");
  const[myIpUnavailable,setMyIpUnavailable]=useState(false);
  const[activeIpLists,setActiveIpLists]=useState(new Set());
  const[manualIps,setManualIps]=useState([]); // {ip,active}
  const[showAddIp,setShowAddIp]=useState(false);
  const[ipInput,setIpInput]=useState("");
  const[noTimer,setNoTimer]=useState(false);
  const[durMins,setDurMins]=useState(120);
  const[durValue,setDurValue]=useState(2);
  const[durUnit,setDurUnit]=useState("hours");
  const[durModalAction,setDurModalAction]=useState(null);
  const[durModalMeta,setDurModalMeta]=useState({title:"Custom duration",hint:"Between 5 minutes and 7 days."});
  const[adjustModalOpen,setAdjustModalOpen]=useState(false);
  const[adjustMode,setAdjustMode]=useState("extend"); // extend | reduce | set
  const duration=noTimer?0:durMins;

  // IP list management
  const[newListName,setNewListName]=useState("");
  const[newListIpInput,setNewListIpInput]=useState("");
  const[newListIps,setNewListIps]=useState([]);

  const flash=(msg,type="success")=>{setToast({msg,type});clearTimeout(toastTm.current);toastTm.current=setTimeout(()=>setToast(null),4000)};

  // Polling — 500ms while progress modal is open, 3s otherwise
  const fetchAll=useCallback(async()=>{
    try{
      const[s,st,il]=await Promise.all([api("/status"),api("/stats"),api("/ip-lists")]);
      setStatus(s);setStats(st);setIpLists(il);setErr(null);
      setConnected(true);lastCheckedRef.current=Date.now();
    }catch(e){setErr("Connection failed");setConnected(false);lastCheckedRef.current=Date.now();}
    finally{setLoading(false)}
  },[]);

  useEffect(()=>{fetchAll();const iv=setInterval(fetchAll,progressModal?500:3000);return()=>clearInterval(iv)},[fetchAll,!!progressModal]);

  // Advance progress modal from 'caddy' phase once reload completes
  useEffect(()=>{
    if(!progressModal||progressModal.phase!=='caddy'||!status)return;
    if(!progressModal.caddySeen){
      if(status.caddy_synced===false)setProgressModal(m=>m?{...m,caddySeen:true}:m);
      return;
    }
    if(status.caddy_reload_error)setProgressModal(m=>m?{...m,phase:'caddy_error',error:status.caddy_reload_error}:m);
    else if(status.caddy_synced===true)setProgressModal(m=>m?{...m,phase:'done'}:m);
  },[status,progressModal]);

  // Auto-dismiss progress modal 3s after completion
  useEffect(()=>{
    if(!progressModal||progressModal.phase!=='done')return;
    dismissTm.current=setTimeout(()=>setProgressModal(null),3000);
    return()=>clearTimeout(dismissTm.current);
  },[progressModal?.phase]);

  // Animate progress bar based on elapsed time vs expected debounce duration
  useEffect(()=>{
    if(!progressModal){setProgressPct(0);return;}
    if(progressModal.phase==='done'){setProgressPct(100);return;}
    if(progressModal.phase==='error'||progressModal.phase==='caddy_error')return;
    const{startedAt,debounceMs}=progressModal;
    const iv=setInterval(()=>{
      setProgressPct(Math.min(99,Math.round((Date.now()-startedAt)/debounceMs*100)));
    },80);
    return()=>clearInterval(iv);
  },[progressModal?.phase]);

  // Countdown from 3 to 0 while done phase is showing
  useEffect(()=>{
    if(!progressModal||progressModal.phase!=='done')return;
    setCountdown(3);
    const iv=setInterval(()=>setCountdown(c=>Math.max(0,c-1)),1000);
    return()=>clearInterval(iv);
  },[progressModal?.phase]);
  useEffect(()=>{
    const svcs=[
      ()=>fetch("https://api.ipify.org?format=json").then(r=>r.json()).then(d=>d.ip),
      ()=>fetch("https://ifconfig.me/ip").then(r=>r.text()).then(t=>t.trim()),
      ()=>fetch("https://icanhazip.com").then(r=>r.text()).then(t=>t.trim()),
    ];
    (async()=>{
      for(const svc of svcs){try{const ip=await svc();if(ip){setMyIpAddr(ip);return}}catch{}}
      setMyIpUnavailable(true);
    })();
  },[]);

  // Theme
  useEffect(()=>{document.documentElement.setAttribute("data-theme",dark?"dark":"light");try{localStorage.setItem('cl-theme',dark?'dark':'light')}catch{}},[dark]);

  // Service worker + install prompt
  useEffect(()=>{
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    }
    const dismissed=()=>{try{return localStorage.getItem('cl-install-dismissed')==='1'}catch{return false}};
    const handler=e=>{
      e.preventDefault();
      if(!dismissed())setInstallPrompt(e);
    };
    window.addEventListener('beforeinstallprompt',handler);
    window.addEventListener('appinstalled',()=>setInstallPrompt(null));
    return()=>window.removeEventListener('beforeinstallprompt',handler);
  },[]);

  // Seed the country form once from the last-used config (live when open,
  // otherwise the persisted last_countries) so it reflects the previous
  // selection instead of a hardcoded default.
  useEffect(()=>{
    if(seeded.current||!status)return;
    seeded.current=true;
    const cs=(status.enabled?status.allowed_countries:status.last_countries)||[];
    const allC=!!(status.enabled?status.all_countries:status.last_all_countries);
    setGeoRestriction(!allC);
    setSelCountries(new Set(cs));
    setExtraCountries(new Set(cs.filter(c=>!quickPicks.includes(c))));
  },[status]);

  // Browser notifications — fire on state transitions detected by the polling loop
  useEffect(()=>{
    if(!status)return;
    const prev=prevStatusRef.current;
    if(prev===null){prevStatusRef.current=status;return;}
    if(typeof Notification==='undefined'||Notification.permission!=='granted'){prevStatusRef.current=status;return;}
    const notify=(title,opts)=>{try{new Notification(title,opts)}catch{}};
    if(!prev.enabled&&status.enabled){
      const countries=status.all_countries?"all countries":(status.allowed_countries?.join(", ")||"none");
      const dur=status.expires?`expires ${fmtTime(status.expires)}`:"no timer";
      notify("🔓 CaddyLatch opened",{body:`${countries} — ${dur}`,icon:"/icons/icon-192.png"});
      timerWarnFiredRef.current=false;
    }else if(prev.enabled&&!status.enabled){
      notify("🔒 CaddyLatch locked",{body:status.disabled_reason||"locked",icon:"/icons/icon-192.png"});
    }
    if(status.enabled&&status.expires&&!timerWarnFiredRef.current){
      const rem=new Date(status.expires).getTime()-Date.now();
      if(rem>0&&rem<=10*60*1000){
        notify("⏱️ CaddyLatch closing soon",{body:"Less than 10 minutes remaining",icon:"/icons/icon-192.png"});
        timerWarnFiredRef.current=true;
      }
    }
    prevStatusRef.current=status;
  },[status]);

  // Settings: load once on mount to seed quick picks, then fully on view entry
  const loadSettings=useCallback(async()=>{
    setSettingsLoading(true);
    try{
      const d=await api("/settings");
      setSettingsData(d);
      const qp=(d.quick_pick_countries||"").split(",").map(c=>c.trim()).filter(Boolean);
      const picks=qp.length?qp:DEFAULT_QUICK_PICKS;
      setQuickPicks(picks);
      setSQuickPicks(picks);
      setSNtfyEnabled(d.ntfy_enabled!==false&&d.ntfy_enabled!=="false");
      setSNtfyUrl(d.ntfy_url||"");
      setSNtfyTopic(d.ntfy_topic||"");
      if(d.ntfy_token)setSNtfyAuthMode("token");
      else if(d.ntfy_user)setSNtfyAuthMode("userpass");
      else setSNtfyAuthMode("none");
      setSNtfyUser(d.ntfy_user||"");
      setSNtfyPass(d.ntfy_pass||"");
      setSNtfyToken(d.ntfy_token||"");
      setSNtfyPriority(d.ntfy_priority||3);
      setSNtfyAlertPriority(d.ntfy_alert_priority||5);
      setSDefaultDur(d.default_duration_minutes||120);
      setSReminder(d.reminder_interval_minutes??0);
      setSTimezone(d.display_timezone||"UTC");
    }catch(e){flash("Failed to load settings","error");}
    finally{setSettingsLoading(false);}
  },[]);
  useEffect(()=>{loadSettings();},[loadSettings]);
  useEffect(()=>{if(view==="settings")loadSettings();},[view,loadSettings]);
  useEffect(()=>{if(view==="settings")return;const iv=setInterval(loadSettings,30000);return()=>clearInterval(iv)},[view,loadSettings]);

  const saveSetting=async(key,value)=>{
    const r=await api("/settings",{method:"PUT",body:JSON.stringify({[key]:value})});
    if(r.error)flash(r.error,"error");else flash("Saved");
  };
  const handleAuthModeChange=async(mode)=>{
    setSNtfyAuthMode(mode);
    if(mode==="none"){setSNtfyUser("");setSNtfyPass("");setSNtfyToken("");await api("/settings",{method:"PUT",body:JSON.stringify({ntfy_user:"",ntfy_pass:"",ntfy_token:""})});}
    else if(mode==="userpass"){setSNtfyToken("");await api("/settings",{method:"PUT",body:JSON.stringify({ntfy_token:""})});}
    else{setSNtfyUser("");setSNtfyPass("");await api("/settings",{method:"PUT",body:JSON.stringify({ntfy_user:"",ntfy_pass:""})});}
  };
  const testNtfy=async()=>{
    setSTestingNtfy(true);
    const r=await api("/test-ntfy",{method:"POST"});
    setSTestingNtfy(false);
    if(r.error)flash(r.error,"error");else flash("Test notification sent");
  };

  // Duplicate IP check
  const ipExistsIn=(ip)=>{
    if(myIpAddr&&ip===myIpAddr+"/32")return"My IP";
    for(const[name,ips]of Object.entries(ipLists)){
      if(ips.includes(ip))return name;
    }
    return null;
  };

  // Actions
  const doEnable=async()=>{
    setActing(true);setModal(null);
    setProgressModal({action:'enable',phase:'api',error:null,caddySeen:false,startedAt:Date.now(),debounceMs:(status?.reload_debounce_seconds??5)*1000,wgControl:status?.wg_control});
    const ips=[...manualIps.filter(m=>m.active).map(m=>m.ip)];
    if(myIpActive&&myIpAddr)ips.push(myIpAddr+"/32");
    const body={
      allowed_countries:geoRestriction?[...selCountries]:[],
      all_countries:!geoRestriction,
      allowed_ips:ips,
      allowed_ip_lists:[...activeIpLists],
      duration_minutes:duration,
    };
    try{
      const r=await api("/enable",{method:"POST",body:JSON.stringify(body)});
      setActing(false);
      if(r.error){setProgressModal(m=>m?{...m,phase:'error',error:r.error}:m);}
      else{setStatus(r);setProgressModal(m=>m?{...m,phase:'caddy',caddySeen:false}:m);}
    }catch(e){setActing(false);setProgressModal(m=>m?{...m,phase:'error',error:e.message||"Request failed"}:m);}
  };

  const doDisable=async()=>{
    setActing(true);setModal(null);
    setProgressModal({action:'disable',phase:'api',error:null,caddySeen:false,startedAt:Date.now(),debounceMs:(status?.reload_debounce_seconds??5)*1000,wgControl:status?.wg_control});
    try{
      const r=await api("/disable",{method:"POST"});
      setActing(false);
      if(r.error){setProgressModal(m=>m?{...m,phase:'error',error:r.error}:m);}
      else{setStatus(r);setProgressModal(m=>m?{...m,phase:'caddy',caddySeen:false}:m);}
    }catch(e){setActing(false);setProgressModal(m=>m?{...m,phase:'error',error:e.message||"Request failed"}:m);}
  };

  const doTunnelUp=async()=>{
    setModal(null);
    const r=await api("/tunnel/up",{method:"POST"});
    if(r.error){flash(r.error,"error")}
    else{setStatus(s=>s?{...s,wg_up:r.wg_up}:s);flash("Tunnel connected")}
  };
  const doTunnelDown=async()=>{
    setModal(null);
    const r=await api("/tunnel/down",{method:"POST"});
    if(r.error){flash(r.error,"error")}
    else{setStatus(s=>s?{...s,wg_up:r.wg_up}:s);flash("Tunnel disconnected")}
  };
  const confirmTunnelUp=()=>setModal({title:"Connect tunnel?",body:"This will start the WireGuard tunnel and enable it to auto-start on boot.",confirm:"Connect",style:{border:"none",background:"var(--grn)",color:"#0a0c10"},action:doTunnelUp});
  const confirmTunnelDown=()=>setModal({title:"Disconnect tunnel?",body:"This will stop the WireGuard tunnel and remove it from auto-start.",confirm:"Disconnect",style:{borderColor:"var(--red)",background:"var(--red-d)",color:"var(--red)"},action:doTunnelDown});

  const doExtend=async(mins)=>{
    setActing(true);
    const r=await api("/extend",{method:"POST",body:JSON.stringify({additional_minutes:mins})});
    setActing(false);
    if(r.error){flash(r.error,"error")}else{setStatus(r);flash(mins<0?`Reduced by ${-mins} min`:`Extended by ${mins} min`)}
  };

  const applyAdjustModal=()=>{
    const mins=clampDur(durValue,durUnit)*UNIT_CFG[durUnit].f;
    setAdjustModalOpen(false);
    if(adjustMode==="extend")doExtend(mins);
    else if(adjustMode==="reduce")doExtend(-mins);
    else doSetTimer(mins);
  };

  // IP list CRUD
  const saveList=async(name,ips)=>{
    const r=await api(`/ip-lists/${encodeURIComponent(name)}`,{method:"PUT",body:JSON.stringify({ips})});
    setIpLists(r);flash(`List "${name}" saved`);
  };
  const deleteList=async(name)=>{
    const r=await api(`/ip-lists/${encodeURIComponent(name)}`,{method:"DELETE"});
    if(r.error){flash(r.error,"error")}else{setIpLists(r);activeIpLists.delete(name);setActiveIpLists(new Set(activeIpLists));flash(`List "${name}" deleted`)}
  };

  const addManualIp=()=>{
    const v=ipInput.trim();if(!v)return;
    const f=v.includes("/")?v:v+"/32";
    const dup=ipExistsIn(f);
    if(dup){flash(`IP ${f} already exists in "${dup}"`,"error");return}
    if(manualIps.some(m=>m.ip===f)){flash(`IP ${f} already added`,"error");return}
    setManualIps([...manualIps,{ip:f,active:true}]);setIpInput("");
  };

  const toggleCountry=(c)=>{
    const s=new Set(selCountries);
    if(s.has(c))s.delete(c);else s.add(c);
    setSelCountries(s);
  };
  const addExtraCountry=(c)=>{
    setExtraCountries(new Set([...extraCountries,c]));
    setSelCountries(new Set([...selCountries,c]));
    setShowCountrySearch(false);setCountryQuery("");setCountryLimit(10);
  };
  const removeExtraCountry=(c)=>{
    const e=new Set(extraCountries);e.delete(c);setExtraCountries(e);
    const s=new Set(selCountries);s.delete(c);setSelCountries(s);
  };

  const confirmOpen=()=>{
    const geo=!geoRestriction?"All countries":([...selCountries].map(c=>`${gf(c)} ${c}`).join(", ")||"None selected");
    let ip;
    if(!ipRestriction){
      ip="No restriction (allow any IP)";
    }else{
      const parts=[];
      if(myIpActive&&myIpAddr)parts.push(`${esc(myIpAddr)}/32 (My IP)`);
      [...activeIpLists].forEach(name=>{
        const n=(ipLists[name]||[]).length;
        parts.push(`${esc(name)} (${n} IP${n===1?"":"s"})`);
      });
      manualIps.filter(m=>m.active).forEach(m=>parts.push(esc(m.ip)));
      ip=parts.join(", ")||"None selected";
    }
    const dur=noTimer?"No timer (manual close only)":fmtDur(duration);
    setModal({title:"Open the latch?",body:`Traffic will be allowed through with these settings:<br><br><strong>Countries:</strong> ${geo}<br><strong>IPs:</strong> ${ip}<br><strong>Duration:</strong> ${dur}`,confirm:"Open latch",style:{border:"none",background:"var(--grn)",color:"#0a0c10"},action:doEnable});
  };
  const confirmClose=()=>{
    const wgLine=status?.wg_control==="auto"?"The WireGuard tunnel will be stopped and Caddy filters will be locked.":"Caddy filters will be locked. The WireGuard tunnel will remain up.";
    setModal({title:"Lock down?",body:`All public access will be blocked immediately. ${wgLine}`,confirm:"Lock down",style:{borderColor:"var(--red)",background:"var(--red-d)",color:"var(--red)"},action:doDisable});
  };
  // Open the custom-duration modal. cb receives the chosen minutes on confirm.
  const openDurModal=(cb,prefillMins=durMins,title="Custom duration",hint="Between 5 minutes and 7 days.")=>{
    if(prefillMins%1440===0){setDurUnit("days");setDurValue(prefillMins/1440)}
    else if(prefillMins%60===0){setDurUnit("hours");setDurValue(prefillMins/60)}
    else{setDurUnit("minutes");setDurValue(prefillMins)}
    setDurModalAction(()=>cb);
    setDurModalMeta({title,hint});
  };
  const applyDurModal=()=>{const m=clampDur(durValue,durUnit)*UNIT_CFG[durUnit].f;durModalAction(m);setDurModalAction(null)};

  const doSetTimer=async(mins)=>{
    setActing(true);
    const r=await api("/set-timer",{method:"POST",body:JSON.stringify({duration_minutes:mins})});
    setActing(false);
    if(r.error){flash(r.error,"error")}else{setStatus(r);flash("Timer set")}
  };

  const doInstall=async()=>{
    if(!installPrompt)return;
    installPrompt.prompt();
    const{outcome}=await installPrompt.userChoice;
    setInstallPrompt(null);
    if(outcome==='dismissed'){try{localStorage.setItem('cl-install-dismissed','1')}catch{}}
  };

  const isOpen=status?.enabled;

  const q=countryQuery.toLowerCase();
  const countryResults=ALL_COUNTRIES.filter(([c,n])=>!quickPicks.includes(c)&&!selCountries.has(c)&&!extraCountries.has(c)&&(n.toLowerCase().includes(q)||c.toLowerCase().includes(q)));

  if(loading)return <div style={{...S.app,textAlign:"center",paddingTop:80,color:"var(--txt3)"}}>Connecting to CaddyLatch...</div>;

  return(
    <div style={S.app}>
      <style>{`@media(min-width:700px){.lay{grid-template-columns:1fr 260px !important;gap:20px !important}.cd{padding:24px !important}}@media(max-width:580px){.chip-text{display:none!important}}@media(min-width:581px){.chip-icon{display:none!important}}.chip-action{transition:background .15s,border-color .15s,color .15s}`}</style>
      <Toast msg={toast?.msg} type={toast?.type}/>
      <Modal show={!!modal} title={modal?.title} body={modal?.body} confirmLabel={modal?.confirm} confirmStyle={modal?.style} onConfirm={modal?.action} onCancel={()=>setModal(null)}/>
      <ProgressModal modal={progressModal} progressPct={progressPct} countdown={countdown} onDismiss={()=>setProgressModal(null)}/>
      {!!durModalAction&&(
        <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setDurModalAction(null)}}>
          <div style={S.modalBox}>
            <h3 style={{font:"600 16px var(--sans)",marginBottom:10}}>{durModalMeta.title}</h3>
            <div style={S.durRow}>

                </div>

          </div>

            <button style={S.tbtn} onClick={doInstall} title="Install CaddyLatch app">

                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>

            const hov=hoveredChip==='filter';
            const hoverStyle=hov?(isOpen?{background:"var(--red-d)",borderColor:"var(--red)",color:"var(--red)"}:{background:"var(--grn-d)",borderColor:"var(--grn)",color:"var(--grn)"}):{}

            const tooltip=isOpen?"Click to lock down":"Click to open latch";
            return(
              <div
                className="chip-action"
                style={{...S.bdg,...(isOpen?S.bdgOn:S.bdgOff),...hoverStyle,cursor:"pointer"}}

                onMouseEnter={()=>setHoveredChip('filter')}
                onMouseLeave={()=>setHoveredChip(null)}
                title={tooltip}
              >
                <span className="chip-icon" style={{display:"flex",alignItems:"center"}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d={isOpen?"M7 11V7a5 5 0 0 1 9.9-1":"M7 11V7a5 5 0 0 1 10 0v4"}/>
                  </svg>
                </span>
                <div className="chip-text" style={{...S.dot,background:isOpen?"var(--grn)":"var(--amb)"}}/>
                <span className="chip-text">{label}</span>
              </div>
            );
          })()}
          {/* Tunnel status chip (auto or manual mode only) */}
          {(status?.wg_control==="auto"||status?.wg_control==="manual")&&(()=>{
            const manual=status.wg_control==="manual";

            const hoverStyle=hov?(status.wg_up?{background:"var(--red-d)",borderColor:"var(--red)",color:"var(--red)"}:{background:"var(--grn-d)",borderColor:"var(--grn)",color:"var(--grn)"}):{}
            const label=hov?(status.wg_up?"DISCONNECT":"CONNECT"):(status.wg_up?"TUNNEL UP":"TUNNEL DOWN");
            const tooltip=manual?(status.wg_up?"Click to disconnect tunnel":"Click to connect tunnel"):(status.wg_up?"Tunnel: connected":"Tunnel: disconnected");
            return(
              <div
                className={manual?"chip-action":""}
                style={{...S.bdg,...(status.wg_up?S.bdgOn:S.bdgOff),...hoverStyle,...(manual?{cursor:"pointer"}:{})}}

                onMouseEnter={manual?()=>setHoveredChip('tunnel'):undefined}
                onMouseLeave={manual?()=>setHoveredChip(null):undefined}
                title={tooltip}
              >
                <span className="chip-icon" style={{display:"flex",alignItems:"center"}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>

                  </svg>
                </span>
                <div className="chip-text" style={{...S.dot,background:status.wg_up?"var(--grn)":"var(--txt3)"}}/>
                <span className="chip-text">{label}</span>
              </div>

          })()}
        </div>
      </div>

      {(status?.wg_control==="auto"||status?.wg_control==="manual")&&!status?.wg_up&&(

          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <span><strong>Tunnel is down</strong> — no traffic can reach backend services</span>
          </div>
          {status.wg_control==="manual"&&(
            <button onClick={confirmTunnelUp} style={{padding:"5px 14px",borderRadius:6,border:"1px solid var(--amb)",background:"var(--amb-d)",color:"var(--amb)",font:"600 12px var(--sans)",cursor:"pointer",flexShrink:0}}>Connect tunnel</button>

      <div className="lay" style={S.lay}>

              {/* Countries */}
              <div style={S.fg}>
                <div style={S.lb}>Geo restriction</div>
                <Toggle on={geoRestriction} onChange={()=>setGeoRestriction(!geoRestriction)} label={geoRestriction?"Geo restriction (allow selected countries)":"No geo restriction (allow any country)"}/>
                {geoRestriction&&<>
                  <div style={{...S.lb,fontSize:10,margin:"4px 0 8px"}}>Quick picks</div>
                  <div style={S.cps}>
                    {quickPicks.map(c=>(
                      <Chip key={c} style={selCountries.has(c)?S.cpB:S.cpO} onClick={()=>toggleCountry(c)}>
                        {gf(c)} {c} {selCountries.has(c)&&<span style={{opacity:.5,fontSize:11}}>✕</span>}
                      </Chip>

                    {[...extraCountries].filter(c=>!quickPicks.includes(c)).map(c=>(
                      <Chip key={c} style={S.cpB} onClick={()=>removeExtraCountry(c)}>
                        {gf(c)} {c} <span style={{opacity:.5,fontSize:11}}>✕</span>
                      </Chip>
                    ))}
                    <Chip style={S.cpO} onClick={()=>{setShowCountrySearch(!showCountrySearch);setCountryLimit(10)}}>Other...</Chip>
                  </div>
                  {showCountrySearch&&(

                      </div>
                    </div>

              <div style={S.fg}>

                  <div style={S.ipTools}>
                    <Chip style={myIpActive&&!myIpUnavailable?S.cpG:S.cpGi} onClick={myIpUnavailable?undefined:()=>setMyIpActive(!myIpActive)}>
                      ⚡ My IP <span style={{opacity:.6,fontFamily:"var(--mono)",fontSize:11}}>({myIpUnavailable?"(unavailable)":myIpAddr||"detecting..."})</span>
                    </Chip>
                    {Object.entries(ipLists).map(([name,ips])=>(
                      <Chip key={name} style={activeIpLists.has(name)?S.cpP:S.cpPi} onClick={()=>{const s=new Set(activeIpLists);if(s.has(name))s.delete(name);else s.add(name);setActiveIpLists(s)}}>

                          {m.ip}
                          <span style={{opacity:.5,fontSize:10,cursor:"pointer"}} onClick={e=>{e.stopPropagation();setManualIps(manualIps.filter((_,j)=>j!==i))}}>✕</span>
                        </Chip>
                      ))}
                    </div>

                  <div style={S.addLink} onClick={()=>setShowAddIp(!showAddIp)}>{showAddIp?"− Hide":"+ Add other IPs"}</div>

                      <input style={S.ipIn} placeholder="203.0.113.10 or /24" value={ipInput} onChange={e=>setIpInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addManualIp()}}/>
                      <button style={S.ipAb} onClick={addManualIp}>Add</button>
                    </div>
                  )}
                  <div style={S.hint}>IPs from active lists are included automatically.</div>
                </>}
              </div>

              {/* Duration */}
              <div style={S.fg}>

                  <div style={{...S.dg,marginTop:10}}>

                      <div key={p.v} style={{...S.db,...(durMins===p.v?S.dbA:{})}} onClick={()=>setDurMins(p.v)}>{p.l}</div>
                    ))}
                    <div style={{...S.db,...(!DURATION_PRESETS.some(p=>p.v===durMins)?S.dbA:{})}} onClick={()=>openDurModal(m=>setDurMins(m))}>{DURATION_PRESETS.some(p=>p.v===durMins)?"Other":fmtDur(durMins)}</div>
                  </div>
                )}
              </div>

              <button style={S.btnGo} onClick={confirmOpen} disabled={acting||!!progressModal}>{acting?"Opening...":"Open latch"}</button>
            </div>

          {/* ── OPEN STATE ── */}
          {isOpen&&view==="main"&&(
            <div className="cd" style={S.cd}>
              <div style={S.tr}>
                {status.expires?(
                  <>
                    <div style={S.tBlk}><span style={S.tLbl}>Time remaining</span><span style={S.tVal}>{fmtRemaining(status.expires)}</span></div>
                    <div style={S.tBlk}><span style={S.tLbl}>Expires at</span><span style={S.tValS}>{fmtTime(status.expires)}</span></div>

                  <div style={{...S.tBlk,flex:2}}>
                    <span style={S.tLbl}>Timer</span>
                    <span style={{...S.tVal,fontSize:20}}>∞ No timer</span>
                    <span style={{fontSize:11,color:"var(--blu)",cursor:"pointer",marginTop:4}} onClick={()=>openDurModal(m=>doSetTimer(m),60)}>+ Set timer</span>

                      status.allowed_countries?.map(c=><span key={c} style={S.ftg}>{gf(c)} {c}</span>)}
                    {!status.all_countries&&status.allowed_countries?.length===0&&<span style={S.ftg}>None</span>}
                  </div>
                </div>
                <div style={S.fr}>
                  <span style={S.fl}>IPs</span>
                  <div style={S.ft}>
                    {status.allowed_ips?.length===0&&status.allowed_ip_lists?.length===0?
                      <span style={S.ftg}>Any</span>:
                      <>
                        {status.allowed_ips?.map(ip=><span key={ip} style={S.ftg}>{ip}</span>)}
                        {status.allowed_ip_lists?.map(n=><span key={n} style={{...S.ftg,...S.ftgP}}>{n} ({ipLists[n]?.length||"?"})</span>)}
                      </>
                    }
                  </div>
                </div>
              </div>

              {status.expires&&(
                <div style={S.er}>
                  <span style={{font:"600 12px var(--sans)",color:"var(--txt3)"}}>Adjust:</span>
                  {ADJUST_PRESETS.slice(0,3).map(p=><button key={p.v} style={S.eb} onClick={()=>doExtend(p.v)} disabled={acting}>{p.l}</button>)}
                  <button style={S.eb} onClick={()=>{setAdjustMode("extend");setDurValue(30);setDurUnit("minutes");setAdjustModalOpen(true)}} disabled={acting}>Other...</button>
                  {ADJUST_PRESETS.slice(3).map(p=><button key={p.v} style={S.eb} onClick={()=>doExtend(p.v)} disabled={acting}>{p.l}</button>)}
                </div>
              )}

              {adjustModalOpen&&(
                <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setAdjustModalOpen(false)}}>
                  <div style={S.modalBox}>
                    <h3 style={{font:"600 16px var(--sans)",marginBottom:14}}>Adjust timeout</h3>
                    <div style={{display:"flex",gap:6,marginBottom:14}}>
                      {[["extend","Extend by"],["reduce","Reduce by"],["set","Set new timer"]].map(([m,l])=>(
                        <button key={m} style={{flex:1,padding:"7px 4px",borderRadius:6,font:"500 12px var(--sans)",cursor:"pointer",border:"1px solid",borderColor:adjustMode===m?"transparent":"var(--bdr)",background:adjustMode===m?"var(--blu)":"var(--bg4)",color:adjustMode===m?"#0a0c10":"var(--txt2)",transition:"all .15s"}} onClick={()=>setAdjustMode(m)}>{l}</button>
                      ))}
                    </div>
                    <div style={S.durRow}>
                      <input type="number" style={S.durIn} min={UNIT_CFG[durUnit].min} max={UNIT_CFG[durUnit].max} step={UNIT_CFG[durUnit].step} value={durValue} onChange={e=>setDurValue(e.target.value)} onBlur={()=>setDurValue(clampDur(durValue,durUnit))} onKeyDown={e=>{if(e.key==="Enter")applyAdjustModal()}} autoFocus/>
                      <select style={S.durSel} value={durUnit} onChange={e=>{const u=e.target.value;setDurUnit(u);setDurValue(clampDur(durValue,u))}}>
                        <option value="minutes">minutes</option>
                        <option value="hours">hours</option>
                        <option value="days">days</option>
                      </select>
                    </div>
                    <div style={S.hint}>{adjustMode==="extend"?"Added to the remaining time.":adjustMode==="reduce"?"Subtracted from the remaining time.":"Replaces the current expiry with a new timer from now."}</div>
                    <div style={S.modalBtns}>
                      <button style={S.modalCancel} onClick={()=>setAdjustModalOpen(false)}>Cancel</button>
                      <button style={{...S.modalCancel,border:"none",background:"var(--blu)",color:"#0a0c10"}} onClick={applyAdjustModal}>Apply</button>
                    </div>
                  </div>
                </div>
              )}

              <button style={S.btnStop} onClick={confirmClose} disabled={acting||!!progressModal}>{acting?"Locking...":"Lock down"}</button>
            </div>
          )}

          {/* ── IP LISTS MANAGEMENT ── */}
          {view==="lists"&&(
            <div className="cd" style={S.cd}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div style={S.lb}>Manage IP lists</div>
                <Chip style={{...S.cpO,fontSize:11,padding:"4px 10px"}} onClick={()=>setView("main")}>← Back</Chip>
              </div>

              {Object.entries(ipLists).map(([name,ips])=>(
                <div key={name} style={S.lm}>
                  <div style={S.lmH}>
                    <div style={S.lmN}>{name}</div>
                    <div style={S.lmA}>
                      <button style={S.lmBtn} onClick={()=>deleteList(name)} title="Delete">🗑️</button>
                    </div>
                  </div>
                  <div style={{...S.tags,marginTop:0}}>
                    {ips.map(ip=><span key={ip} style={{...S.tag,...S.tagP}}>{ip}</span>)}
                  </div>
                </div>
              ))}

              {Object.keys(ipLists).length===0&&<div style={{...S.hint,marginBottom:14}}>No IP lists created yet.</div>}

              <div style={{marginTop:16,paddingTop:14,borderTop:"1px solid var(--bdr)"}}>
                <div style={{...S.lb,fontSize:10}}>Create new list</div>
                <div style={{display:"flex",gap:8}}>
                  <input style={{...S.ipIn,fontFamily:"var(--sans)"}} placeholder="List name" value={newListName} onChange={e=>setNewListName(e.target.value)}/>
                </div>
                <div style={S.ipR}>
                  <input style={S.ipIn} placeholder="Add IP to list" value={newListIpInput} onChange={e=>setNewListIpInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){const v=newListIpInput.trim();if(v){const f=v.includes("/")?v:v+"/32";if(!newListIps.includes(f)){setNewListIps([...newListIps,f])}setNewListIpInput("")}}}}/>
                  <button style={S.ipAb} onClick={()=>{const v=newListIpInput.trim();if(v){const f=v.includes("/")?v:v+"/32";if(!newListIps.includes(f)){setNewListIps([...newListIps,f])}setNewListIpInput("")}}}>Add</button>
                </div>
                {newListIps.length>0&&(
                  <div style={S.tags}>
                    {newListIps.map(ip=><span key={ip} style={{...S.tag,...S.tagP}}>{ip}<button style={S.tagX} onClick={()=>setNewListIps(newListIps.filter(i=>i!==ip))}>✕</button></span>)}
                  </div>
                )}
                <button style={{...S.btnGo,fontSize:13,padding:"10px 0",marginTop:12}} onClick={()=>{
                  if(!newListName.trim()){flash("Enter a list name","error");return}
                  if(newListIps.length===0){flash("Add at least one IP","error");return}
                  saveList(newListName.trim(),newListIps);setNewListName("");setNewListIps([]);
                }}>Create list</button>
              </div>
            </div>
          )}

          {/* ── SETTINGS VIEW ── */}
          {view==="settings"&&(
            <div className="cd" style={S.cd}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <div style={S.lb}>Settings</div>
                <Chip style={{...S.cpO,fontSize:11,padding:"4px 10px"}} onClick={()=>setView("main")}>← Back</Chip>
              </div>
              {settingsLoading&&<div style={{...S.hint,textAlign:"center",padding:"20px 0"}}>Loading...</div>}
              {!settingsLoading&&settingsData&&(<>
                {/* Notifications */}
                <div style={S.fg}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:sNtfyEnabled?12:0}}>
                    <div style={S.lb}>Notifications (ntfy)</div>
                    <Toggle on={sNtfyEnabled} onChange={()=>{const v=!sNtfyEnabled;setSNtfyEnabled(v);saveSetting("ntfy_enabled",v)}} label=""/>
                  </div>
                  {sNtfyEnabled&&(<>
                  <div style={{...S.lb,fontSize:10,marginBottom:4}}>Server URL</div>
                  <input style={{...S.ipIn,fontFamily:"var(--sans)",width:"100%",marginBottom:10}} placeholder="https://ntfy.sh" value={sNtfyUrl} onChange={e=>setSNtfyUrl(e.target.value)} onBlur={()=>saveSetting("ntfy_url",sNtfyUrl)}/>
                  <div style={{...S.lb,fontSize:10,marginBottom:4}}>Topic</div>
                  <input style={{...S.ipIn,fontFamily:"var(--sans)",width:"100%",marginBottom:10}} placeholder="caddylatch" value={sNtfyTopic} onChange={e=>setSNtfyTopic(e.target.value)} onBlur={()=>saveSetting("ntfy_topic",sNtfyTopic)}/>
                  <div style={{...S.lb,fontSize:10,marginBottom:6}}>Authentication</div>
                  <div style={{display:"flex",gap:6,marginBottom:10}}>
                    {[["none","None"],["userpass","User/Password"],["token","Token"]].map(([m,l])=>(
                      <button key={m} style={{flex:1,padding:"7px 4px",borderRadius:6,font:"500 12px var(--sans)",cursor:"pointer",border:"1px solid",borderColor:sNtfyAuthMode===m?"transparent":"var(--bdr)",background:sNtfyAuthMode===m?"var(--blu)":"var(--bg4)",color:sNtfyAuthMode===m?"#0a0c10":"var(--txt2)",transition:"all .15s"}} onClick={()=>handleAuthModeChange(m)}>{l}</button>
                    ))}
                  </div>
                  {sNtfyAuthMode==="userpass"&&(<>
                    <input type="password" style={{...S.ipIn,fontFamily:"var(--sans)",width:"100%",marginBottom:8}} placeholder="Username" value={sNtfyUser} onChange={e=>setSNtfyUser(e.target.value)} onBlur={()=>saveSetting("ntfy_user",sNtfyUser)}/>
                    <input type="password" style={{...S.ipIn,fontFamily:"var(--sans)",width:"100%",marginBottom:10}} placeholder="Password" value={sNtfyPass} onChange={e=>setSNtfyPass(e.target.value)} onBlur={()=>saveSetting("ntfy_pass",sNtfyPass)}/>
                  </>)}
                  {sNtfyAuthMode==="token"&&(
                    <input type="password" style={{...S.ipIn,fontFamily:"var(--sans)",width:"100%",marginBottom:10}} placeholder="Token" value={sNtfyToken} onChange={e=>setSNtfyToken(e.target.value)} onBlur={()=>saveSetting("ntfy_token",sNtfyToken)}/>
                  )}
                  <div style={{...S.lb,fontSize:10,marginBottom:6}}>Priority</div>
                  <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
                    <span style={{fontSize:12,color:"var(--txt2)"}}>Normal</span>
                    <select style={S.durSel} value={sNtfyPriority} onChange={e=>{setSNtfyPriority(+e.target.value);saveSetting("ntfy_priority",+e.target.value)}}>
                      {[1,2,3,4,5].map(n=><option key={n} value={n}>{n}</option>)}
                    </select>
                    <span style={{fontSize:12,color:"var(--txt2)"}}>Alert</span>
                    <select style={S.durSel} value={sNtfyAlertPriority} onChange={e=>{setSNtfyAlertPriority(+e.target.value);saveSetting("ntfy_alert_priority",+e.target.value)}}>
                      {[1,2,3,4,5].map(n=><option key={n} value={n}>{n}</option>)}
                    </select>
                  </div>
                  <button style={S.ipAb} onClick={testNtfy} disabled={sTestingNtfy}>{sTestingNtfy?"Sending...":"Send test notification"}</button>
                  </>)}
                </div>

                {/* Timer defaults */}
                <div style={S.fg}>
                  <div style={S.lb}>Timer defaults</div>
                  <div style={{...S.lb,fontSize:10,marginBottom:6}}>Default duration</div>
                  <div style={S.dg}>
                    {DURATION_PRESETS.map(p=>(
                      <div key={p.v} style={{...S.db,...(sDefaultDur===p.v?S.dbA:{})}} onClick={()=>{setSDefaultDur(p.v);saveSetting("default_duration_minutes",p.v)}}>{p.l}</div>
                    ))}
                    <div style={{...S.db,...(!DURATION_PRESETS.some(p=>p.v===sDefaultDur)?S.dbA:{})}} onClick={()=>openDurModal(m=>{setSDefaultDur(m);saveSetting("default_duration_minutes",m)},sDefaultDur,"Default duration","Between 5 minutes and 7 days.")}>{DURATION_PRESETS.some(p=>p.v===sDefaultDur)?"Other":fmtDur(sDefaultDur)}</div>
                  </div>
                  <div style={{...S.lb,fontSize:10,marginTop:14,marginBottom:6}}>Reminder interval</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <input type="number" style={{...S.durIn,maxWidth:100}} min={0} step={1} value={sReminder} onChange={e=>setSReminder(e.target.value)} onBlur={()=>saveSetting("reminder_interval_minutes",Math.max(0,parseInt(sReminder)||0))}/>
                    <span style={{fontSize:12,color:"var(--txt2)"}}>minutes (0 = disabled)</span>
                  </div>
                </div>

                {/* Display */}
                <div style={S.fg}>
                  <div style={S.lb}>Display</div>
                  <div style={{...S.lb,fontSize:10,marginBottom:6}}>Timezone</div>
                  <div style={{position:"relative"}}>
                    <input style={{...S.srchIn}} placeholder="Search timezones..." value={sShowTzSearch?sTimezoneQuery:sTimezone}
                      onFocus={()=>{setSShowTzSearch(true);setSTimezoneQuery("")}}
                      onChange={e=>setSTimezoneQuery(e.target.value)}
                      onBlur={()=>setTimeout(()=>setSShowTzSearch(false),150)}/>
                    {sShowTzSearch&&(
                      <div style={{...S.sr,position:"absolute",top:"100%",left:0,right:0,zIndex:10,maxHeight:200}}>
                        {(settingsData.available_timezones||[]).filter(tz=>tz.toLowerCase().includes(sTimezoneQuery.toLowerCase())).slice(0,30).map(tz=>(
                          <div key={tz} style={S.srItem} onMouseDown={e=>{e.preventDefault();setSTimezone(tz);setSTimezoneQuery("");setSShowTzSearch(false);saveSetting("display_timezone",tz)}} onMouseOver={e=>e.currentTarget.style.background="var(--bg3)"} onMouseOut={e=>e.currentTarget.style.background=""}>{tz}</div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>

                {/* Quick pick countries */}
                <div style={S.fg}>
                  <div style={S.lb}>Quick pick countries</div>
                  <div style={S.cps}>
                    {sQuickPicks.map(c=>(
                      <Chip key={c} style={S.cpB} onClick={async()=>{
                        const next=sQuickPicks.filter(x=>x!==c);
                        setSQuickPicks(next);setQuickPicks(next);
                        await saveSetting("quick_pick_countries",next.join(","));
                      }}>{gf(c)} {c} <span style={{opacity:.5,fontSize:11}}>✕</span></Chip>
                    ))}
                    {sQuickPicks.length<12&&<Chip style={S.cpO} onClick={()=>{setSShowQpSearch(!sShowQpSearch);setSQpSearch("")}}>+ Add</Chip>}
                  </div>
                  {sShowQpSearch&&(
                    <div style={S.srch}>
                      <input style={S.srchIn} placeholder="Search countries..." value={sQpSearch} onChange={e=>setSQpSearch(e.target.value)} autoFocus/>
                      <div style={S.sr}>
                        {ALL_COUNTRIES.filter(([c,n])=>!sQuickPicks.includes(c)&&(n.toLowerCase().includes(sQpSearch.toLowerCase())||c.toLowerCase().includes(sQpSearch.toLowerCase()))).slice(0,20).map(([c,n])=>(
                          <div key={c} style={S.srItem} onClick={async()=>{
                            const next=[...sQuickPicks,c];
                            setSQuickPicks(next);setQuickPicks(next);
                            setSShowQpSearch(false);setSQpSearch("");
                            await saveSetting("quick_pick_countries",next.join(","));
                          }} onMouseOver={e=>e.currentTarget.style.background="var(--bg3)"} onMouseOut={e=>e.currentTarget.style.background=""}>{gf(c)} {c} — {n}</div>
                        ))}
                      </div>
                    </div>
                  )}
                  {sQuickPicks.length>=12&&<div style={S.hint}>Maximum 12 quick picks.</div>}
                </div>

                {/* Browser notifications */}
                <div style={S.fg}>
                  <div style={S.lb}>Browser notifications</div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:13,color:"var(--txt2)"}}>Status:</span>
                    <span style={{fontSize:13,fontWeight:600,color:sNotifPerm==="granted"?"var(--grn)":sNotifPerm==="denied"?"var(--red)":"var(--txt2)"}}>
                      {sNotifPerm==="granted"?"Allowed":sNotifPerm==="denied"?"Denied":sNotifPerm==="unsupported"?"Not supported":"Not set"}
                    </span>
                  </div>
                  {sNotifPerm==="default"&&(
                    <button style={S.ipAb} onClick={()=>Notification.requestPermission().then(p=>{setSNotifPerm(p);if(p==='granted'){try{new Notification("🔔 Notifications enabled",{body:"You'll be notified when CaddyLatch opens or closes.",icon:"/icons/icon-192.png"})}catch{}}})}>Enable browser notifications</button>
                  )}
                  {sNotifPerm==="granted"&&(
                    <button style={S.ipAb} onClick={()=>{try{new Notification("🔔 Test notification",{body:"Browser notifications are working.",icon:"/icons/icon-192.png"})}catch{flash("Notification failed — check browser settings","error")}}}>Send test notification</button>
                  )}
                  {sNotifPerm==="denied"&&<div style={{...S.hint,color:"var(--red)"}}>Blocked — change in browser settings</div>}
                </div>

                {/* About */}
                <div style={{...S.fg,marginBottom:0}}>
                  <div style={S.lb}>About</div>
                  <div style={S.si}><div style={S.sl}>Version</div><div style={S.sv}>{status?.version||"—"}</div></div>
                  <div style={S.si}><div style={S.sl}>Agent uptime</div><div style={S.sv}>{stats?fmtUptime(stats.agent_uptime_seconds):"—"}</div></div>
                  <div style={{...S.si,marginBottom:0}}><div style={S.sl}>Config</div><div style={{...S.sv,fontSize:11,color:"var(--txt3)"}}>/etc/caddylatch/caddylatch.conf</div></div>
                </div>
              </>)}
            </div>
          )}

          {/* Last event */}
          {!isOpen&&view==="main"&&status?.disabled_reason&&(
            <div style={S.le}>Last closed: {status.disabled_reason}{status.last_closed?` at ${fmtTime(status.last_closed)}`:""}</div>
          )}
        </div>

        {/* ── Stats sidebar ── */}
        <div>
          <div style={S.sts}>
            <div style={S.stT}>Stats</div>
            {isOpen&&stats?.session_uptime_seconds!=null&&<>
              <div style={S.si}><div style={S.sl}>Session uptime</div><div style={{...S.sv,color:"var(--grn)"}}>{fmtUptime(stats.session_uptime_seconds)}</div></div>
              <div style={S.sd}/>
            </>}
            <div style={S.si}><div style={S.sl}>Last opened</div><div style={S.sv}>{stats?.last_opened?fmtTime(stats.last_opened):"—"}</div></div>
            <div style={S.si}><div style={S.sl}>Last closed</div><div style={S.sv}>{stats?.last_closed?fmtTime(stats.last_closed):"—"}</div></div>
            {isOpen&&stats?.wg_latest_handshake&&<>
              <div style={S.sd}/>
              <div style={S.si}><div style={S.sl}>WG handshake</div><div style={S.sv}>{stats.wg_latest_handshake}</div></div>
              <div style={S.si}><div style={S.sl}>WG transfer ↑</div><div style={S.sv}>{stats.wg_transfer_tx||"—"}</div></div>
              <div style={S.si}><div style={S.sl}>WG transfer ↓</div><div style={S.sv}>{stats.wg_transfer_rx||"—"}</div></div>
            </>}
            <div style={S.sd}/>
            <div style={S.si}><div style={S.sl}>Agent uptime</div><div style={S.sv}>{stats?fmtUptime(stats.agent_uptime_seconds):"—"}</div></div>
            <div style={{...S.si,marginBottom:0}}><div style={S.sl}>Version</div><div style={{...S.sv,color:"var(--txt3)"}}>{status?.version||"—"}</div></div>
          </div>
        </div>
      </div>

      <div style={S.ftr}>CaddyLatch — on-demand edge access controller</div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
